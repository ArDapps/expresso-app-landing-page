kind = "web"
previewPath = "/"
title = "Espresso App Landing Page"
version = "1.0.0"
id = "artifacts/espresso-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22112

[services.development]
run = "pnpm --filter @workspace/espresso-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/espresso-landing", "run", "build" ]
publicDir = "artifacts/espresso-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22112"
BASE_PATH = "/"
